task: deu-hsb
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:  
    test: llms-limited-resources2026-private/Sorbian/MT/de-hsb_mt_dev.jsonl
test_split: test
doc_to_text: "Translate the following German text to Upper Sorbian. Put it in this format <hsb> Upper Sorbian translation </hsb>.\n<deu> {{de}} </deu>"
doc_to_target: "{{hsb}}"
filter_list:
  - name: "remove_tags"
    filter:
      - function: "regex"
        regex_pattern: "<hsb> (.*) </hsb>"
      - function: "take_first"
metric_list:
  - metric: bleu
  - metric: !function lm_eval.tasks.wmt26-lrl.utils.chrf_pp
    aggregation: chrf++
    higher_is_better: true
metadata:
  version: 0.0