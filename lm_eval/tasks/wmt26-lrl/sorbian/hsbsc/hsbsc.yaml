task: hsbsc
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:  
    test: llms-limited-resources2026-private/Sorbian/hsb/SC/HSB_sc_dev.jsonl
    # test: https://raw.githubusercontent.com/TUM-NLP/llms-limited-resources2026-private/refs/heads/main/Sorbian/dsb/SC/DSB_sc_dev.jsonl?token=GHSAT0AAAAAADQADRFMDRL6Q6DHM7RVAA3K2PKJJPQ
test_split: test
doc_to_text: "Correct this sentence. Put it in this format <corrected> Lower Sorbian translation </corrected>.\n<sentence> {{corrupted_sentence}} </sentence>"
doc_to_target: "{{original_sentence}}"
generation_kwargs:
  until:
    - "</corrected>"
    # - "\n"
  max_gen_toks: 128
  # temperature: 1
  # top_p: 1.00
  # top_k: 20
  # min_p: 0.0
  # presence_penalty: 2.0
  # repetition_penalty: 1.0
filter_list:
  - name: "remove_tags"
    filter:
      - function: "regex"
        regex_pattern: "<corrected> (.*)"
      - function: "take_first"
metric_list:
  - metric: bleu
  - metric: chrf
metadata:
  version: 0.0