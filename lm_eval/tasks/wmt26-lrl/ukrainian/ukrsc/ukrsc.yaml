task: dsbsc
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:  
    test: llms-limited-resources2026-private/Ukrainian/SC/urk_sc_dev.jsonl
    # test: https://raw.githubusercontent.com/TUM-NLP/llms-limited-resources2026-private/refs/heads/main/Sorbian/dsb/SC/DSB_sc_dev.jsonl?token=GHSAT0AAAAAADQADRFMDRL6Q6DHM7RVAA3K2PKJJPQ
test_split: test
doc_to_text: "Identify and correct the corrupted word in the sentence. The sentence could also be correct, in which case, output <wrong> CORRECT </wrong>, <corrected> CORRECT </corrected>. Put the answer in this format <wrong> wrong word </wrong>, <corrected> correct word </corrected>.\n<sentence> {{corrupted_sentence}} </sentence>"
generation_kwargs:
  until:
    - "</corrected>"
    # - "\n"
  max_gen_toks: 128
  # temperature: 1
  # top_p: 1.00
  # top_k: 20
  # min_p: 0.0
  # presence_penalty: 2.0
  # repetition_penalty: 1.0
process_results: !function ../../sc_utils.process_results
metric_list:
  - metric: exact_match_wrong
    aggregation: mean
    higher_is_better: true
  - metric: exact_match_corrected
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0.0