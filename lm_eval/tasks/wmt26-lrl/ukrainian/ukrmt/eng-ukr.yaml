task: eng-ukr
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: llms-limited-resources2026-private/Ukrainian/MT/en-ukr_mt_dev.jsonl
test_split: test
doc_to_text: "Translate the following English text to Ukrainian. Put it in this format <ukr> Ukrainian translation </ukr>.\n<eng> {{en}} </eng>"
doc_to_target: "{{en}}"
generation_kwargs:
  until:
    - "</ukr>"
  max_gen_toks: 1024
filter_list:
  - name: "remove_tags"
    filter:
      - function: "regex"
        regex_pattern: "<ukr> (.*)"
      - function: "take_first"
metric_list:
  - metric: bleu
  - metric: !function lm_eval.tasks.wmt26-lrl.utils.chrf_pp
    aggregation: chrf++
    higher_is_better: true
metadata:
  version: 0.0