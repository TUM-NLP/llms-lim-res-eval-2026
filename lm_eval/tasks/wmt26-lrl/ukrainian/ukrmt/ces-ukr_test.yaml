task: ces-ukr_test
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: llms-limited-resources2026/Ukrainian/MT/cs-ukr_mt_test.jsonl
test_split: test
doc_to_text: "Translate the following Czech text to Ukrainian. Put it in this format <ukr> Ukrainian translation </ukr>.\n<ces> {{cs}} </ces>"
doc_to_target: ""
generation_kwargs:
  until:
    - "<|endoftext|>"
    - "<|im_end|>"
  max_gen_toks: 256
  temperature: 1
  top_p: 1.0
  top_k: 20
  min_p: 0.0
  repetition_penalty: 1.0
filter_list:
  - name: "remove_tags"
    filter:
      - function: "strip_thinking"
      - function: "regex"
        regex_pattern: "<uk[rр]?>\\s*([\\s\\S]*?)\\s*(?:</uk[rр]?>|$)"
      - function: "take_first"
metric_list:
  - metric: bleu
  - metric: !function lm_eval.tasks.wmt26-lrl.utils.chrf_pp
    aggregation: chrf++
    higher_is_better: true
metadata:
  version: 0.0
